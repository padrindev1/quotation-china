<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKTZ ERP — Login</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  body { background: #0a0a0a; }
  .login-page {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px;
    background: radial-gradient(ellipse at 50% -10%, rgba(0,255,136,.08) 0%, transparent 65%);
  }
  .login-card {
    background: #161616; border-radius: 18px;
    border: 1px solid rgba(255,255,255,.08);
    box-shadow: 0 0 80px rgba(0,255,136,.05), 0 24px 64px rgba(0,0,0,.7);
    padding: 48px 40px; width: 100%; max-width: 400px;
  }
  .login-logo { text-align: center; margin-bottom: 36px; }
  .login-logo img { width: 130px; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
  .login-logo .brand { font-size: 34px; font-weight: 800; color: #fff; letter-spacing: 1.5px; line-height: 1; }
  .login-logo .brand span { color: #00ff88; }
  .login-logo .sub { font-size: 12px; color: #666; margin-top: 8px; letter-spacing: .5px; text-transform: uppercase; }
  .login-divider { height: 1px; background: rgba(255,255,255,.07); margin-bottom: 28px; }
  label { color: #777; font-size: 12px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; }
  input[type="email"], input[type="password"] {
    background: #111; border: 1.5px solid rgba(255,255,255,.09);
    color: #e8e8e8; border-radius: 8px; height: 46px; font-size: 14px;
  }
  input[type="email"]:focus, input[type="password"]:focus {
    border-color: #00ff88; box-shadow: 0 0 0 3px rgba(0,255,136,.12); outline: none;
  }
  input::placeholder { color: #3a3a3a; }
  #login-btn {
    background: #00ff88; color: #000; font-weight: 700; font-size: 15px;
    border-radius: 8px; height: 46px; width: 100%; border: none; cursor: pointer;
    transition: all .2s ease; margin-top: 8px; letter-spacing: .3px;
  }
  #login-btn:hover:not(:disabled) { background: #33ffaa; box-shadow: 0 0 28px rgba(0,255,136,.35); }
  #login-btn:disabled { opacity: .45; cursor: not-allowed; }
  .security-note { text-align: center; margin-top: 24px; font-size: 11.5px; color: #444; }
  .err-msg { display: none; }
</style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="/images/logo.svg" alt="OKTZ" onerror="this.style.display='none'">
      <div class="brand">OK<span>TZ</span></div>
      <div class="sub">Sistema ERP · Importação</div>
    </div>

    <div class="login-divider"></div>

    <div id="err-msg" class="alert alert-error err-msg mb-3">
      <i>⚠</i><span id="err-text">Credenciais inválidas</span>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required autocomplete="username" placeholder="seu@email.com.br">
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" id="login-btn">Entrar</button>
    </form>

    <p class="security-note">🔒 Acesso restrito — sistema interno OKTZ</p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
if (Auth.getToken()) window.location.href = '/dashboard';

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errDiv = document.getElementById('err-msg');
  const errText = document.getElementById('err-text');

  btn.disabled = true;
  btn.textContent = 'Entrando...';
  errDiv.style.display = 'none';

  try {
    const data = await API.post('/api/auth/login', {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    });

    Auth.setToken(data.accessToken);
    Auth.setRefresh(data.refreshToken);
    Auth.setUser(data.user);

    if (data.mustChangePassword) {
      window.location.href = '/dashboard?changePassword=1';
    } else {
      window.location.href = '/dashboard';
    }
  } catch (err) {
    errText.textContent = err.message || 'Credenciais inválidas';
    errDiv.style.display = 'flex';
    btn.disabled = false;
    btn.textContent = 'Entrar';
    document.getElementById('password').value = '';
  }
});
</script>
</body>
</html>
